<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<sc-if value="{{ shown }}" hint-placeholder-val="{{ true }}">
  <div style="position:absolute;inset:0;z-index:60;background:rgba(8,8,10,.93);backdrop-filter:blur(9px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;font-family:'DM Mono',ui-monospace,monospace;">
    <div style="width:62px;height:62px;border-radius:50%;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.85);">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>
    </div>
    <div style="font:500 19px/1 'DM Mono',monospace;color:#ededed;letter-spacing:.02em;">Paused</div>
    <div style="font:400 13px/1 'DM Mono',monospace;color:rgba(255,255,255,.74);">{{ elapsed }} elapsed &middot; board hidden</div>
    <button onClick="{{ onResume }}" style="display:flex;align-items:center;gap:8px;height:44px;padding:0 22px;border-radius:11px;background:#0a0a0b;box-shadow:inset 0 0 0 1px rgba(192,255,238,.45);color:#C0FFEE;font:400 14px/1 'DM Mono',monospace;border:none;cursor:pointer;margin-top:4px;">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Resume
    </button>
  </div>
</sc-if>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:390,&quot;height&quot;:560},&quot;shown&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;elapsed&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;0:42&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;onResume&quot;:{&quot;editor&quot;:null,&quot;tsType&quot;:&quot;() =&gt; void&quot;}}"></script>
</body>
</html>
