<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Color console — c0ffee</title>
  <meta name="description" content="Play with a color across RGB and HSV, see it as light. Share any color by its link.">
  <link rel="stylesheet" href="../tokens.css">
  <style>
    html, body { margin: 0; min-height: 100vh; }
    body {
      background: var(--c0ffee-bg);
      color: var(--c0ffee-fg);
      font-family: var(--c0ffee-font);
      display: flex; flex-direction: column;
    }
    /* The Site banner is full-width chrome at the top of the document (normal
       flow, not sticky); the solo console sits centered in the space below it. */
    main {
      flex: 1;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 20px; padding: 40px 16px;
    }
    h1 { font-size: 16px; font-weight: 600; color: #888; letter-spacing: .5px; }
    h1 .hex { color: var(--c0ffee-accent); }
    .share { color: #666; font-size: 13px; }
    .share code { color: #9aa; }
  </style>
</head>
<body>
  <c0ffee-banner></c0ffee-banner>

  <main>
    <h1>#<span class="hex">C0FFEE</span> · the Color console</h1>

    <!-- `reflect` opts this console into owning the URL: it seeds from the hash on
         load, re-seeds on paste-and-enter (hashchange), and writes the canonical link
         as the color moves — all inside the element now (C0FFEE-22). The page no longer
         hand-rolls a listener, and the legacy ?hex= query is retired. -->
    <c0ffee-console reflect></c0ffee-console>

    <p class="share">Your color lives in this page's URL — copy the address to share it.
       <br>Try <code>#E91E63</code>, or paste any hex into the address bar.</p>
  </main>

  <script type="module" src="../toys/banner.ts"></script>
  <script type="module">
    import '../toys/console.ts';
  </script>
</body>
</html>
