<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>c0ffee — console, converged</title>
  <style>
    :root {
      --c0ffee-accent: #C0FFEE; --c0ffee-fg: #ededed;
      --c0ffee-font: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    }
    html, body { margin: 0; height: 100%; background: #f0eee9; }
    #root { height: 100vh; }
  </style>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;700&family=DM+Mono:wght@300;400;500&family=Roboto+Mono:wght@100;200;300&family=JetBrains+Mono:wght@100;200;300&family=IBM+Plex+Mono:wght@100;200;300&family=Mansalva&family=Helvetica+Neue&display=swap" rel="stylesheet">

  <script src="c0ffee/color.js"></script>
  <script src="c0ffee/banner.js"></script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="instrument/engine.jsx"></script>
  <script type="text/babel" src="studio/parts.jsx"></script>
  <script type="text/babel" src="studio/layouts.jsx"></script>

  <script type="text/babel">
    function Frame({ children, pad = 22 }) {
      return (
        <div style={{ height: '100%', background: '#0b0b0b', boxSizing: 'border-box', display: 'flex', flexDirection: 'column' }}>
          <c0ffee-banner></c0ffee-banner>
          <div style={{ flex: 1, display: 'flex', alignItems: 'flex-start', justifyContent: 'center', padding: `8px ${pad}px ${pad}px` }}>
            <div style={{ width: '100%' }}>{children}</div>
          </div>
        </div>
      );
    }

    function Brief() {
      const mono = 'ui-monospace,"SF Mono",Menlo,Consolas,monospace';
      const H = ({ children }) => (
        <div style={{ fontSize: 11, letterSpacing: '2px', textTransform: 'uppercase', color: '#a08e7a', margin: '18px 0 8px' }}>{children}</div>
      );
      const dot = (c) => <span style={{ display: 'inline-block', width: 9, height: 9, borderRadius: '50%', background: c, marginRight: 7, verticalAlign: 'middle' }}></span>;
      return (
        <div style={{ height: '100%', boxSizing: 'border-box', background: '#fbfaf7', color: '#2a241e', fontFamily: mono, padding: '28px 32px', overflow: 'hidden', fontSize: 13, lineHeight: 1.55 }}>
          <div style={{ fontSize: 21, fontWeight: 700, letterSpacing: '-.3px' }}>
            c<span style={{ color: '#1fae8f' }}>0</span>ffee · console — toggleable
          </div>
          <div style={{ color: '#7a6e60', marginTop: 4 }}>
            New type &amp; mark: <b>DM Mono</b> in the console, <b>Mansalva</b> script in the chrome, your <b>pixel cup</b> as the logo.
          </div>

          <H>This pass</H>
          <div style={{ display: 'grid', gap: 5 }}>
            <div>{dot('#C0FFEE')}<b>DM Mono</b> — console numerals &amp; labels (slashed zero).</div>
            <div>{dot('#00FF00')}<b>Bigger chrome cup</b> — the pixel art now reads in the banner.</div>
            <div>{dot('#FF0000')}<b>Hero lockup variations</b> — inline + stacked c0ffee/cafe (branding section).</div>
            <div>{dot('#0000FF')}<b>Brighter fader handles</b> — more white so they lift off the track.</div>
          </div>

          <H>Try it</H>
          <div style={{ color: '#5f564a' }}>
            Hit the toggle to switch views. Drag a fader. Tap a hex pair for the 16s + 1s math. Click a channel name to isolate it.
          </div>

          <H>Open questions</H>
          <div style={{ color: '#5f564a' }}>
            Which hero lockup (A inline / B stacked / C stacked-hash / D lowercase)? Chrome cup size good? Handles lift enough now?
          </div>
        </div>
      );
    }

    function App() {
      return (
        <DesignCanvas>
          <DCSection id="brief" title="New type & mark" subtitle="DM Mono · Mansalva script · pixel-cup logo · chrome lockup wired">
            <DCArtboard id="note" label="Design note" width={680} height={520}>
              <Brief />
            </DCArtboard>
          </DCSection>

          <DCSection id="instrument" title="The instrument" subtitle="Tap the toggle (top-right) to switch Venn-hero ↔ compact corner. Drag a fader, tap a hex pair, isolate a channel.">
            <DCArtboard id="hero-d" label="Desktop · defaults to hero" width={500} height={1044}>
              <Frame><div style={{ maxWidth: 440, margin: '0 auto' }}><Console venn="hero" /></div></Frame>
            </DCArtboard>
            <DCArtboard id="corner-d" label="Desktop · defaults to corner" width={500} height={714}>
              <Frame><div style={{ maxWidth: 440, margin: '0 auto' }}><Console venn="corner" /></div></Frame>
            </DCArtboard>
            <DCArtboard id="mob-hero" label="Mobile · compact (toggle inside)" width={390} height={820}>
              <Frame pad={14}><Console venn="hero" compact /></Frame>
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
