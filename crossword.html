<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>c0ffee — Hex Color crossword</title>
  <meta name="description" content="A crossword whose answers are colors: every clue is a Swatch, every Slot a six-digit Hex color address. Reason the hex, fill the woven grid.">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" sizes="any" href="/favicon.ico">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="tokens.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background: var(--c0ffee-bg);
      color: var(--c0ffee-fg);
      font-family: var(--c0ffee-font);
      /* svh (small viewport height): a mobile browser's collapsing toolbar can't grow the
         page past the visible screen and reintroduce clipping of the single-viewport game
         (Option A, C0FFEE-73). */
      min-height: 100svh;
      display: flex; flex-direction: column;
    }

    /* The Hex Color crossword shown solo (a self-contained game served on its own
       route — not a new page type, ADR-0006). The Site banner is quiet chrome at the
       top of the document; the crossword owns its own centered, clamped column below.
       Block layout (not flex) so the block-level <c0ffee-crossword> fills the width and
       its inner column self-centers — a flex row would shrink-wrap the host and starve
       the fluid board of width. flex:1 reserves all space below the Site banner; the
       element fills it (Option A, C0FFEE-73) so the game fits one viewport without the
       page scrolling — overflow is absorbed inside the active pane, not by <main>. */
    main {
      flex: 1;
      min-height: 0; /* let flex:1 bound <main> to the viewport remainder, not its content */
      padding: 0.6vh 5vw 0.8vh; /* tight: the old generous 2vh/6vh was for the scroll layout */
    }
    c0ffee-crossword { display: block; max-width: 430px; margin: 0 auto; }
  </style>
</head>
<body>
  <c0ffee-banner section="Crosshatch"></c0ffee-banner>

  <!-- The crossword shown solo. It opts OUT of ADR-0001 URL reflection (it holds many
       Color values), so the host is a thin mount with no hash wiring — unlike the
       console root. Slice 1 (C0FFEE-64) renders read-only; input arrives in later
       slices on the same element. -->
  <main>
    <c0ffee-crossword></c0ffee-crossword>
  </main>

  <script type="module" src="./elements/banner.ts"></script>
  <script type="module" src="./elements/crossword.ts"></script>
  <script type="module" src="./telemetry.ts"></script>
</body>
</html>
