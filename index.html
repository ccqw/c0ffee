<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>c0ffee — the Color console</title>
  <meta name="description" content="One color, every way at once — a swatch, the additive Venn palette, and RGB + HSV controls, all kept in sync. Share any color by its link.">
  <link rel="stylesheet" href="tokens.css">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      background: var(--c0ffee-bg);
      color: var(--c0ffee-fg);
      font-family: var(--c0ffee-font);
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    /* The site root IS the flagship Color console shown solo (CONTEXT.md): the
       Site banner is quiet chrome at the top of the document (normal flow, not
       sticky), and the console owns the rest of the viewport — centered, with
       no prose. "Full-bleed" here is the page-type sense (the one interactive
       owns the whole page, no cards or prose framing it), not zero-margin: the
       console is a fixed-width card, so the padding is just breathing room that
       keeps it off the edges on a narrow viewport. A visitor lands directly in
       the interactive. */
    main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 4vh 6vw 6vh;
    }
  </style>
</head>
<body>
  <c0ffee-banner></c0ffee-banner>

  <!-- The flagship shown solo. `presentation="full"` (C0FFEE-23) shows every part;
       `reflect` (C0FFEE-22) opts this console into owning location.hash, so a
       shared c0ffee.cafe/#<hex> link seeds it on load, paste-and-enter re-seeds
       live, and edits write the canonical Color link back. Both behaviors live
       inside the element — the root is a thin host with no bespoke wiring. -->
  <main>
    <c0ffee-console presentation="full" reflect></c0ffee-console>
  </main>

  <script type="module" src="./elements/banner.ts"></script>
  <script type="module" src="./elements/console.ts"></script>
</body>
</html>
