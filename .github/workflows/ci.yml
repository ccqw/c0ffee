name: CI

# PR gate (C0FFEE-10): the same typecheck → test → build steps deploy.yml runs
# on main, but on pull requests — so a red merge is caught BEFORE it lands,
# not after as a failed deploy. Deliberately duplicates deploy.yml's build-job
# steps; a reusable workflow is more concept than ~8 lines warrant.
on:
  pull_request:

permissions:
  contents: read

# Newest push per PR wins; superseded runs are cancelled, not queued.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # v6 = Node 24 runtime; GitHub force-migrates v4's Node 20 on 2026-06-16
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
