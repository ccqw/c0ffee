name: Deploy to GitHub Pages

# Replaces legacy root-branch serving (ADR-0006): build the Vite output and
# publish dist/ as the Pages artifact. CNAME + .nojekyll ride along from public/.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write # publish to Pages
  id-token: write # OIDC auth for actions/deploy-pages

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck # fail the deploy on a type regression — vite build alone strips types unchecked
      - run: npm test # gate on the color core + happy-dom shell tests
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
