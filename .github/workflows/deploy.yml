name: Deploy to GitHub Pages

# Replaces legacy root-branch serving (ADR-0006): build the Vite output and
# publish dist/ as the Pages artifact. CNAME + .nojekyll ride along from public/.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write # publish to Pages
  id-token: write # OIDC auth for actions/deploy-pages

# One deploy at a time; don't cancel an in-flight publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # v6 = Node 24 runtime; GitHub force-migrates v4's Node 20 on 2026-06-16
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run typecheck # fail the deploy on a type regression — vite build alone strips types unchecked
      - run: npm test # gate on the color core + happy-dom shell tests
      - run: npm run build
      # include-hidden-files because v4+ drops dotfiles by default and dist/
      # carries .nojekyll
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
          include-hidden-files: true

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5 # v5 = Node 24; last Node-20 action gone
