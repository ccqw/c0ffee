<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>c0ffee-mirror — demo</title>
  <link rel="stylesheet" href="../tokens.css">
  <style>
    body {
      margin: 0; min-height: 100vh; background: var(--c0ffee-bg);
      color: var(--c0ffee-fg); font-family: var(--c0ffee-font);
      display: flex; flex-direction: column; align-items: center; gap: 24px;
      padding: 40px 16px;
    }
    h1 { font-size: 18px; font-weight: 600; color: #888; }
    .pair { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
    .note { color: #777; font-size: 13px; text-align: center; max-width: 40ch; }
  </style>
</head>
<body>
  <h1>&lt;c0ffee-mirror&gt; — C0FFEE-2 demo</h1>
  <div class="pair">
    <!-- seeded from attribute -->
    <c0ffee-mirror hex="3A7BD5"></c0ffee-mirror>
    <!-- a second instance proves per-instance state isolation -->
    <c0ffee-mirror hex="C0FFEE"></c0ffee-mirror>
  </div>
  <p class="note">Two mirrors, independent state. Drag sliders or type hex pairs.
     The left is seeded <code>#3A7BD5</code>; the right <code>#C0FFEE</code>.
     A bad <code>hex</code> attribute falls back to the default blue.</p>
  <script type="module" src="./mirror.js"></script>
</body>
</html>
